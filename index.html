<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JRM Private Security — Lobby Display</title>
<style>
  :root {
    --navy: #211D51;
    --navy-dark: #171340;
    --gold: #AE832E;
    --gold-dark: #946E23;
    --white: #FFFFFF;
    --blue: #1E73BE;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--navy);
    font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--white);
  }

  body.idle { cursor: none; }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2.2vh 3vw 1.6vh 3vw;
  }

  header .logo img {
    height: 8vh;
    max-height: 90px;
    width: auto;
    display: block;
  }

  header .logo .logo-fallback {
    font-size: clamp(22px, 3vw, 40px);
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  header .clock-block {
    text-align: right;
  }

  header .clock {
    font-size: clamp(28px, 3.4vw, 52px);
    font-weight: 500;
    color: var(--white);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  header .date {
    margin-top: 0.4vh;
    font-size: clamp(14px, 1.4vw, 22px);
    color: var(--gold);
    letter-spacing: 0.03em;
  }

  .gold-rule {
    flex: 0 0 auto;
    height: 2px;
    margin: 0 3vw;
    background: linear-gradient(90deg, var(--gold), var(--gold-dark) 60%, transparent);
  }

  /* ---------- Stage ---------- */
  #stage {
    position: relative;
    flex: 1 1 auto;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vh 6vw;
    opacity: 0;
    transition: opacity 1.1s ease-in-out;
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Callout slide */
  .callout-slide {
    flex-direction: column;
    text-align: center;
    max-width: 1400px;
    margin: 0 auto;
  }

  .callout-byline {
    font-size: clamp(34px, 4.4vw, 68px);
    font-weight: 400;
    color: var(--gold);
    margin: 0 0 3vh 0;
    line-height: 1.15;
  }

  .callout-text {
    font-size: clamp(20px, 2.3vw, 34px);
    font-weight: 400;
    color: var(--white);
    line-height: 1.5;
    margin: 0;
    max-width: 60ch;
  }

  .callout-author {
    margin-top: 3.5vh;
    font-size: clamp(14px, 1.3vw, 20px);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Bio slide */
  .bio-slide {
    justify-content: center;
    gap: 6vw;
    max-width: 1600px;
    margin: 0 auto;
  }

  .bio-photo-wrap {
    flex: 0 0 auto;
    width: clamp(220px, 22vw, 420px);
    height: clamp(280px, 28vw, 520px);
    border-radius: 18px;
    border: 2px solid var(--gold);
    overflow: hidden;
    background: var(--navy-dark);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bio-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .bio-monogram {
    font-size: clamp(60px, 8vw, 140px);
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .bio-info {
    flex: 0 1 640px;
    max-width: 640px;
  }

  .bio-name {
    font-size: clamp(30px, 3.6vw, 56px);
    font-weight: 500;
    color: var(--gold);
    margin: 0 0 0.6vh 0;
    line-height: 1.1;
  }

  .bio-title {
    font-size: clamp(16px, 1.6vw, 24px);
    font-weight: 400;
    color: var(--white);
    font-variant: small-caps;
    letter-spacing: 0.08em;
    margin: 0 0 2.6vh 0;
    opacity: 0.9;
  }

  .bio-text {
    font-size: clamp(16px, 1.5vw, 24px);
    line-height: 1.5;
    color: var(--white);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Empty state */
  .empty-slide {
    text-align: center;
    color: var(--gold);
    font-size: clamp(20px, 2vw, 30px);
  }

  /* ---------- Progress dots ---------- */
  #dots {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 2.4vh;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 5;
  }

  #dots .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    transition: background 0.4s ease, transform 0.4s ease;
  }

  #dots .dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <img id="logo-img" src="assets/brand/JRM_FULL_LOGO_LIGHT-300x244.png" alt="JRM Private Security"
             onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';" />
        <div class="logo-fallback" id="logo-fallback" style="display:none;">JRM PRIVATE SECURITY</div>
      </div>
      <div class="clock-block">
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="date">&nbsp;</div>
      </div>
    </header>
    <div class="gold-rule"></div>

    <div id="stage"></div>
    <div id="dots"></div>
  </div>

<script>
(function () {
  "use strict";

  var SLIDE_INTERVAL_MS = 12000;
  var DATA_REFRESH_MS = 10 * 60 * 1000;
  var IDLE_CURSOR_MS = 5000;
  var DAILY_RELOAD_HOUR = 4; // 04:00 local time

  var stage = document.getElementById("stage");
  var dotsEl = document.getElementById("dots");

  var slides = [];
  var slideEls = [];
  var currentIndex = -1;
  var rotateTimer = null;

  // ---------- Clock ----------
  function pad(n) { return String(n).padStart(2, "0"); }

  function updateClock() {
    var now = new Date();
    var h = now.getHours();
    var ampm = h >= 12 ? "PM" : "AM";
    var h12 = h % 12 || 12;
    document.getElementById("clock").textContent = h12 + ":" + pad(now.getMinutes()) + " " + ampm;
    document.getElementById("date").textContent = now.toLocaleDateString(undefined, {
      weekday: "long", month: "long", day: "numeric", year: "numeric"
    });
  }
  updateClock();
  setInterval(updateClock, 15000);

  // ---------- Idle cursor ----------
  var idleTimer = null;
  function resetIdle() {
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () {
      document.body.classList.add("idle");
    }, IDLE_CURSOR_MS);
  }
  ["mousemove", "mousedown", "keydown", "touchstart"].forEach(function (evt) {
    window.addEventListener(evt, resetIdle, { passive: true });
  });
  resetIdle();

  // ---------- Daily reload ----------
  function scheduleDailyReload() {
    var now = new Date();
    var next = new Date(now);
    next.setHours(DAILY_RELOAD_HOUR, 0, 0, 0);
    if (next <= now) next.setDate(next.getDate() + 1);
    var ms = next - now;
    setTimeout(function () { location.reload(); }, ms);
  }
  scheduleDailyReload();

  // ---------- Build slides ----------
  function initials(name) {
    if (!name) return "?";
    var parts = name.trim().split(/\s+/);
    var first = parts[0] ? parts[0][0] : "";
    var last = parts.length > 1 ? parts[parts.length - 1][0] : "";
    return (first + last).toUpperCase();
  }

  function buildCalloutSlide(c) {
    var el = document.createElement("div");
    el.className = "slide callout-slide";
    var byline = document.createElement("p");
    byline.className = "callout-byline";
    byline.textContent = c.byline || "";
    var text = document.createElement("p");
    text.className = "callout-text";
    text.textContent = c.text || "";
    el.appendChild(byline);
    el.appendChild(text);
    if (c.author) {
      var author = document.createElement("div");
      author.className = "callout-author";
      author.textContent = c.author;
      el.appendChild(author);
    }
    return el;
  }

  function buildBioSlide(m) {
    var el = document.createElement("div");
    el.className = "slide bio-slide";

    var photoWrap = document.createElement("div");
    photoWrap.className = "bio-photo-wrap";
    if (m.photo) {
      var img = document.createElement("img");
      img.src = m.photo;
      img.alt = m.name || "";
      img.onerror = function () {
        photoWrap.innerHTML = "";
        var mono = document.createElement("div");
        mono.className = "bio-monogram";
        mono.textContent = initials(m.name);
        photoWrap.appendChild(mono);
      };
      photoWrap.appendChild(img);
    } else {
      var mono2 = document.createElement("div");
      mono2.className = "bio-monogram";
      mono2.textContent = initials(m.name);
      photoWrap.appendChild(mono2);
    }

    var info = document.createElement("div");
    info.className = "bio-info";
    var name = document.createElement("p");
    name.className = "bio-name";
    name.textContent = m.name || "";
    var title = document.createElement("p");
    title.className = "bio-title";
    title.textContent = m.title || "";
    var bio = document.createElement("p");
    bio.className = "bio-text";
    bio.textContent = m.bio || "";
    info.appendChild(name);
    info.appendChild(title);
    info.appendChild(bio);

    el.appendChild(photoWrap);
    el.appendChild(info);
    return el;
  }

  function buildEmptySlide() {
    var el = document.createElement("div");
    el.className = "slide empty-slide";
    var p = document.createElement("p");
    p.textContent = "JRM PRIVATE SECURITY";
    el.appendChild(p);
    return el;
  }

  function interleave(bios, callouts) {
    // Alternate callout / bio slides. If one list is empty, just use the other.
    var out = [];
    var i = 0, j = 0;
    while (i < callouts.length || j < bios.length) {
      if (j < bios.length) out.push({ type: "bio", data: bios[j++] });
      if (i < callouts.length) out.push({ type: "callout", data: callouts[i++] });
    }
    return out;
  }

  function render(data) {
    stage.innerHTML = "";
    dotsEl.innerHTML = "";
    slideEls = [];
    clearInterval(rotateTimer);

    var callouts = Array.isArray(data.callouts) ? data.callouts : [];
    var team = Array.isArray(data.team) ? data.team : [];

    var queue = interleave(team, callouts);

    if (queue.length === 0) {
      var empty = buildEmptySlide();
      empty.classList.add("active");
      stage.appendChild(empty);
      return;
    }

    queue.forEach(function (item) {
      var el = item.type === "callout" ? buildCalloutSlide(item.data) : buildBioSlide(item.data);
      stage.appendChild(el);
      slideEls.push(el);

      var dot = document.createElement("div");
      dot.className = "dot";
      dotsEl.appendChild(dot);
    });

    currentIndex = -1;
    advance();
    if (slideEls.length > 1) {
      rotateTimer = setInterval(advance, SLIDE_INTERVAL_MS);
    }
  }

  function advance() {
    if (slideEls.length === 0) return;
    if (currentIndex >= 0) {
      slideEls[currentIndex].classList.remove("active");
      dotsEl.children[currentIndex].classList.remove("active");
    }
    currentIndex = (currentIndex + 1) % slideEls.length;
    slideEls[currentIndex].classList.add("active");
    dotsEl.children[currentIndex].classList.add("active");
  }

  // ---------- Data loading ----------
  function loadData() {
    fetch("data.json", { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("data.json fetch failed: " + res.status);
        return res.json();
      })
      .then(render)
      .catch(function (err) {
        console.error(err);
        if (slideEls.length === 0) render({ callouts: [], team: [] });
      });
  }

  loadData();
  setInterval(loadData, DATA_REFRESH_MS);
})();
</script>
</body>
</html>
